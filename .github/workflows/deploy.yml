name: Build and deploy site

# Builds the React landing page (Vite) and the static manual / legal
# pages, then deploys everything to GitHub Pages.
#
# Manual and legal pages are generated from markdown that lives in
# the app repository (DaRguez-Git/Vida-app-flutter, docs/web), which
# stays the single source of truth. Reading that private repo needs
# the APP_REPO_TOKEN secret — a fine-grained PAT with Contents:read
# access to it.
#
# Pages activates each deploy based on the web repo's commit SHA: if
# the SHA hasn't changed, a re-uploaded artifact is not promoted to
# the live site. To keep deploys flowing when only the app manuals
# change, the build job tracks the app's revision in
# .github/manuals-revision and pushes a bump commit when that
# revision moves. The bump commit triggers a fresh workflow run on a
# new SHA, and that run is the one that actually deploys.

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [manuals-updated]
  schedule:
    - cron: '17 5 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.revcheck.outputs.should_deploy }}
    steps:
      - name: Check out the website
        uses: actions/checkout@v4

      - name: Check out the manuals from the app repo
        uses: actions/checkout@v4
        with:
          repository: DaRguez-Git/Vida-app-flutter
          ref: main
          token: ${{ secrets.APP_REPO_TOKEN }}
          path: _app
          sparse-checkout: docs/web

      - name: Bump web SHA if the app manuals revision changed
        id: revcheck
        run: |
          NEW_REV=$(git -C _app rev-parse HEAD)
          OLD_REV=$(cat .github/manuals-revision 2>/dev/null || true)
          echo "App manuals HEAD: $NEW_REV"
          echo "Stored revision:  ${OLD_REV:-<none>}"
          if [ "$NEW_REV" = "$OLD_REV" ]; then
            echo "Revisions match; proceeding with build and deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "New manuals revision detected; bumping web repo SHA."
            mkdir -p .github
            echo "$NEW_REV" > .github/manuals-revision
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add .github/manuals-revision
            git commit -m "Bump manuals revision to ${NEW_REV:0:8}"
            git push origin HEAD:main
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Bump pushed; the resulting workflow run will publish the manuals."
          fi

      - name: Configure Pages
        if: steps.revcheck.outputs.should_deploy == 'true'
        uses: actions/configure-pages@v5

      - name: Set up Node
        if: steps.revcheck.outputs.should_deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        if: steps.revcheck.outputs.should_deploy == 'true'
        run: npm ci

      - name: Build the landing page
        if: steps.revcheck.outputs.should_deploy == 'true'
        run: npm run build

      - name: Set up Python
        if: steps.revcheck.outputs.should_deploy == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        if: steps.revcheck.outputs.should_deploy == 'true'
        run: python -m pip install --quiet markdown

      - name: Stage manual and legal sources
        if: steps.revcheck.outputs.should_deploy == 'true'
        run: |
          mkdir -p assets/web/help/en
          cp _app/docs/web/help/*.md             assets/web/help/
          cp _app/docs/web/help/en/*.md          assets/web/help/en/
          cp _app/docs/web/legal/PRIVACY_POLICY.md     assets/PRIVACY_POLICY.md
          cp _app/docs/web/legal/PRIVACY_POLICY_EN.md  assets/PRIVACY_POLICY_EN.md
          cp _app/docs/web/legal/TERMS.md              assets/TERMS.md
          cp _app/docs/web/legal/TERMS_EN.md           assets/TERMS_EN.md

      - name: Build manual and legal pages
        if: steps.revcheck.outputs.should_deploy == 'true'
        run: python3 scripts/build_help.py

      - name: Assemble the site
        if: steps.revcheck.outputs.should_deploy == 'true'
        run: |
          mkdir _site
          cp -r dist/. _site/
          for d in oficio/help oficio/privacy oficio/terms \
                   en/oficio/help en/oficio/privacy en/oficio/terms; do
            if [ -d "$d" ]; then
              mkdir -p "_site/$d"
              cp -r "$d/." "_site/$d/"
            fi
          done

      - name: Upload Pages artifact
        if: steps.revcheck.outputs.should_deploy == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: needs.build.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
